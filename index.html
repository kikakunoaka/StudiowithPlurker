<body>

<header class="site-header">
  <div class="wrap">
    <a class="brand" href="index.html">
      <span class="charm-dot"><img src="assets/img/icon.svg" alt="噗浪人在用的周邊客製工作室 icon"></span>
        <span>噗浪<span class="brand-squeeze">人在用的</span>周邊客製工作室<small>CUSTOM STUDIO with PLURKer</small></span>
    </a>
    <nav class="header-nav">
      <a class="nav-back" href="https://www.plurk.com/p/3iwsb1k1ce" target="_blank" rel="noopener">偷偷說本舖</a>
      <a class="nav-back" href="https://forms.gle/vKrqEjvEFRfstep89" target="_blank" rel="noopener">經驗分享</a>
      <a class="nav-back" href="https://docs.google.com/spreadsheets/d/1fpoLejfAJz6bQwAPA4xwTzQzW21Y-5ABPT1f-vaGwsQ/edit?gid=329307325#gid=329307325" target="_blank" rel="noopener">結果確認</a>
    </nav>
  </div>
</header>

<main class="wrap">
  <section class="hero">
    <p>旨在整理工作室資訊、經驗分享、評價等等</br>
      抓bug、修正、許願、建議等可於上方連結留言</p>

    <details class="changelog-details">
      <summary class="changelog-summary">
        <span class="changelog-dot"></span>
        <span>使用說明</span>
        <span class="changelog-arrow">👇</span>
      </summary>
      <div class="changelog-content" id="usageContent">
        <div class="spinner" style="width:20px; height:20px; margin:10px auto;"></div>
        <p style="text-align:center; font-size:0.85rem; color:var(--ink-soft);">說明載入中...</p>
      </div>
    </details>

    <details class="changelog-details">
      <summary class="changelog-summary">
        <span class="changelog-dot"></span>
        <span>更新日誌</span>
        <span class="changelog-arrow">👇</span>
      </summary>
      <div class="changelog-content" id="changelogContent">
        <div class="spinner" style="width:20px; height:20px; margin:10px auto;"></div>
        <p style="text-align:center; font-size:0.85rem; color:var(--ink-soft);">日誌載入中...</p>
      </div>
    </details>

    <div class="search-box">
      <input type="text" id="searchInput" placeholder="搜尋工作室名稱或噗浪帳號…">
    </div>
  </section>

  <section class="filters">
    <div class="filter-group">
      <label>營運狀況</label>
      <select id="filterStatus"><option value="">全部狀態</option></select>
    </div>
    <div class="filter-group">
      <label>工廠</label>
      <select id="filterFactory"><option value="">全部工廠</option></select>
    </div>
    <div class="filter-group">
      <label>客製項目</label>
      <select id="filterItem"><option value="">全部項目</option></select>
    </div>
    <div class="filter-group">
      <label>排序方式</label>
      <select id="filterSort">
        <option value="latest_desc">評價新→舊</option>
        <option value="count_desc">評價多→寡</option>
        <option value="avg_desc">評價高→低</option>
      </select>
    </div>
  </section>

  <p class="result-count" id="resultCount"></p>

  <section class="studio-grid" id="studioGrid" aria-live="polite"></section>
</main>
